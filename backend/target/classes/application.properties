# ──────────────────────────────────────────
# QuantView Backend — Application Config
# ──────────────────────────────────────────

# Server
server.port=8080

# Python ML Engine URL
python.service.url=http://localhost:5000
python.ml.url=http://localhost:5000

# ===============================
# Phase 3: Real-Time Market Feed
# ===============================
finnhub.api.key=${FINNHUB_API_KEY:sandbox_key_here}
finnhub.ws.url=wss://ws.finnhub.io
market.poll.interval.ms=1000
sse.heartbeat.interval.ms=30000

# ── Database Configuration ──
# Default: H2 in-memory (works without MySQL installed)
# Switch to MySQL by uncommenting the MySQL section and commenting H2

# H2 (Development fallback — no setup needed)
spring.datasource.url=jdbc:h2:mem:quantview
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL (Production — uncomment to use)
# spring.datasource.url=jdbc:mysql://localhost:3306/quantview
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# HikariCP Connection Pool (Spring Boot default — explicit tuning)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Logging
logging.level.com.quantview=INFO
